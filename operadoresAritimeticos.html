<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores Aritmeticos</title>
</head>
<body>
    
    <script>

        let a = 10, b = 3

        // ------ Operadores Aritimeticos -----------

        console.log(a + b) // adição
        console.log(a - b) // subtração
        console.log(a * b) // multiplicação
        console.log(a / b) // divisão
        console.log(a % b) // resto da divisão
        console.log(a ** b) // potencia

        // Operadores de comparação
        
        console.log (5 == '5') // comparação de igualdade
        console.log(2 === 2) // comparação de igualdade exata
        console.log(5 != 2) // comparação de diferença
        console.log(5 < 3) // comparação de menor
        console.log(2 > 3) // comparação de maior
        console.log (5 <= 3) // comparação de menor ou igual
        console.log (2 > 1) // comparação de maior ou igual
        
        
        // Operadores Relacionais 

        console.log(" && E")
        console.log("! NOT")
        console.log("|| OU")





    </script>



</body>
</html>
